name: welfare-mall-v2

services:
  mysql:
    image: mysql:8.4
    container_name: welfare-mall-v2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: welfare_mall_v2
      MYSQL_USER: welfare_mall
      MYSQL_PASSWORD: welfare_mall_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: welfare-mall-v2-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: welfare-mall-v2-api:${WELFARE_MALL_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: welfare-mall-v2-api
    environment:
      - PORT=3000
      - DATABASE_URL=mysql://welfare_mall:welfare_mall_password@mysql:3306/welfare_mall_v2
      - API_CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175
    ports:
      - "3000:3000"
    command: ["sh", "-c", "pnpm --filter @welfare-mall/api exec prisma db push --skip-generate && node apps/api/dist/src/main.js"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  admin:
    image: welfare-mall-v2-admin:${WELFARE_MALL_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        - VITE_ADMIN_API_BASE_URL=http://localhost:3000/api
    container_name: welfare-mall-v2-admin
    environment:
      - VITE_ADMIN_API_BASE_URL=http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5173', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  merchant:
    image: welfare-mall-v2-merchant:${WELFARE_MALL_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/merchant/Dockerfile
      args:
        - VITE_MERCHANT_API_BASE_URL=http://localhost:3000/api
    container_name: welfare-mall-v2-merchant
    environment:
      - VITE_MERCHANT_API_BASE_URL=http://localhost:3000/api
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5174', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  portal:
    image: welfare-mall-v2-portal:${WELFARE_MALL_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:3000/api
    container_name: welfare-mall-v2-portal
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
    ports:
      - "5175:5175"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5175', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
